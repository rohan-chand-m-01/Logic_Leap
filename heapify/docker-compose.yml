version: '3.8'
services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: heapify
      POSTGRES_USER: heapify
      POSTGRES_PASSWORD: heapify_dev
    ports: ["5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]

  redis:
    image: redis:7-alpine
    ports: ["6379:6379"]

  qdrant:
    image: qdrant/qdrant
    ports: ["6333:6333"]
    volumes: [qdrantdata:/qdrant/storage]

volumes:
  pgdata:
  qdrantdata:
